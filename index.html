<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="여행가계부">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#185FA5">
<title>여행 가계부</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💶</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💶</text></svg>">
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, sans-serif; background: #f5f5f5; }
  .splash {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 16px; color: #555;
  }
  .splash-icon { font-size: 64px; }
  .splash-title { font-size: 20px; font-weight: 700; color: #185FA5; }
  .splash-sub { font-size: 14px; color: #aaa; }
  .spinner {
    width: 28px; height: 28px; border: 3px solid #eee;
    border-top-color: #185FA5; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-top: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<script>
  // 바로 리다이렉트
  window.location.replace("https://script.google.com/macros/s/AKfycby8vHY1D7gBWstlBtz-RAkdGcHwCg2TpoqWNz_uQCQiZROS3QWlKLme8N55tdCkioLvYw/exec");
</script>
</head>
<body>
<div class="splash">
  <div class="splash-icon">💶</div>
  <div class="splash-title">여행 가계부</div>
  <div class="splash-sub">로딩 중...</div>
  <div class="spinner"></div>
</div>
</body>
</html>
